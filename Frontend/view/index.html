<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <nav class="navbar px-4">
        <span class="navbar-brand"> API Practica</span>
        <div class="d-flex gap-2">
            <a href="index.html" class="btn active">Productos</a>
            <a href="users.html" class="btn">Usuarios</a>
            <a href="posts.html" class="btn">Posts</a>
            <a href="carts.html" class="btn">Carts</a>
        </div>
    </nav>

    <div class="container">
        <h1>Lista productos</h1>
 
        <!-- Buscar -->
        <label>Id</label>
        <input id="idFilter" type="text" class="form-control">
        <button class="btn btn-success mt-2" onclick="getFindByIdProduct()">Consultar</button>
 
        <!-- Crear -->
        <h5 class="mt-4">Agregar producto</h5>
        <div class="d-flex gap-2 mb-3">
            <input id="new_title" class="form-control" placeholder="Título">
            <input id="new_price" type="number" class="form-control" placeholder="Precio">
            <button class="btn btn-primary" onclick="createProduct()">Agregar</button>
        </div>
 
        <!-- Tabla -->
        <table class="table">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="container"></tbody>
        </table>
    </div>
 
   <script src="../js/const.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/products.js"></script>

</body>
</html>
